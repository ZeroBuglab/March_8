<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для Бика жаным </title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Caveat:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --accent: #ff4d6d; --bg: #fff5f8; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: var(--bg); height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif; overflow: hidden;
            background: radial-gradient(circle at center, #ffffff 0%, #ffeef2 100%);
        }
        #card {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); padding: 30px 20px;
            border-radius: 35px; box-shadow: 0 20px 50px rgba(255, 77, 109, 0.2);
            width: 92%; max-width: 380px; text-align: center;
            border: 1px solid white; z-index: 10;
        }
        h1 { font-family: 'Pacifico', cursive; color: var(--accent); font-size: 22px; margin-bottom: 20px; }
        #message-area {
            font-family: 'Caveat', cursive; font-size: 28px; color: #444;
            min-height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
        }
        #next-btn {
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3); color: white; border: none;
            padding: 18px; border-radius: 20px; font-size: 18px; font-weight: 600;
            width: 100%; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 77, 109, 0.2);
            transition: transform 0.2s;
        }
        #next-btn:active { transform: scale(0.95); }
        #final-screen { display: none; opacity: 0; width: 100%; }
        
        .photo-container {
            width: 100%; margin-top: 10px; border-radius: 15px;
            overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid white; cursor: pointer;
        }
        .photo-container img { width: 100%; height: auto; display: block; }

        #fullscreen-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100;
            justify-content: center; align-items: center; opacity: 0;
        }
        #fullscreen-overlay img { max-width: 98%; max-height: 90%; border-radius: 5px; }
        #close-hint { position: absolute; bottom: 30px; color: white; font-size: 14px; opacity: 0.7; }

        .emoji-float { position: fixed; pointer-events: none; z-index: 5; animation: rise 4s linear forwards; }
        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

<audio id="bg-music" src="vals.mp3" preload="auto" loop></audio>

<div id="card">
    <div id="quest-part">
        <h1 id="title">С 8 Марта! ❤️</h1>
        <div id="message-area">У меня есть кое-что для тебя...</div>
        <button id="next-btn" onclick="playStep()">Нажми сюда ✨</button>
    </div>

    <div id="final-screen">
        <h1 style="font-size: 20px;">Моей жанымке 📝</h1>
        <div class="photo-container" onclick="openFull()">
            <img src="card.png" id="letter-img" alt="Твое письмо">
        </div>
        <p style="font-size: 13px; color: var(--accent); font-weight: bold; margin-top: 15px; font-family: 'Caveat'; font-size: 20px;">
            Нажми на письмо, чтобы прочитать полностью ❤️
        </p>
    </div>
</div>

<div id="fullscreen-overlay" onclick="closeFull()">
    <img src="card.png" alt="Письмо на весь экран">
    <div id="close-hint">Нажми в любое место, чтобы закрыть</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>
    let step = 0;
    const phrases = [
        "Мой самый яркий лучик солнца ☀️", 
        "Моя неповторимая Лара Джин Кови🎬🍿",  
        "Ты вдохновляешь меня каждый день🥰", 
        "Самая красивая девушка в мире❤️", 
        "Я безумно ценю каждый миг с тобой ❤️"  
    ];

    function playStep() {
        // Запуск музыки при первом клике (обязательно для телефонов)
        const music = document.getElementById('bg-music');
        if (music.paused) {
            music.play().catch(e => console.log("Ждем взаимодействия для музыки"));
        }

        if (step < phrases.length) {
            gsap.to("#message-area", { 
                duration: 0.3, opacity: 0, y: -10,
                onComplete: () => {
                    document.getElementById('message-area').innerText = phrases[step];
                    gsap.to("#message-area", { duration: 0.3, opacity: 1, y: 0 });
                    step++;
                    if(step === phrases.length) document.getElementById('next-btn').innerText = "ОТКРЫТЬ ПИСЬМО ✨";
                }
            });
            confetti({ particleCount: 15, spread: 40, origin: { y: 0.8 }, colors: ['#ff4d6d', '#ffffff'] });
        } else {
            showLetter();
        }
    }

    function showLetter() {
        gsap.to("#quest-part", { duration: 0.5, opacity: 0, display: "none", onComplete: () => {
            const final = document.getElementById('final-screen');
            final.style.display = "block";
            gsap.to(final, { duration: 1, opacity: 1 });
            setInterval(spawnEmoji, 500);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }});
    }

    function openFull() {
        const overlay = document.getElementById('fullscreen-overlay');
        overlay.style.display = 'flex';
        gsap.to(overlay, { duration: 0.4, opacity: 1 });
    }

    function closeFull() {
        const overlay = document.getElementById('fullscreen-overlay');
        gsap.to(overlay, { duration: 0.3, opacity: 0, onComplete: () => overlay.style.display = 'none' });
    }

    function spawnEmoji() {
        const el = document.createElement('div');
        el.className = 'emoji-float';
        el.innerText = '❤️';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (Math.random() * 20 + 20) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
</script>
</body>
</html>
