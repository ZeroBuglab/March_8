<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моей самой особенной ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Caveat:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose: #ffafbd;
            --gold: #d4af37;
            --soft-white: #fffafa;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        #card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 25px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #d4418e;
            font-size: 26px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .message-text {
            font-family: 'Caveat', cursive;
            font-size: 28px;
            color: #555;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        #action-btn {
            background: linear-gradient(45deg, #ff6a88, #ff99ac);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 20px rgba(255, 106, 136, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #action-btn:active { transform: scale(0.95); }

        #final-screen { display: none; opacity: 0; transition: opacity 1s ease; }

        .photo-container {
            margin: 20px auto;
            position: relative;
            width: 220px;
            height: 220px;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .b-day-note {
            font-size: 14px;
            color: #d4418e;
            font-weight: bold;
            margin-top: 10px;
            background: #fff0f5;
            padding: 5px 10px;
            border-radius: 10px;
            display: inline-block;
        }

        .floating-element {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: floatUp 5s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="card">
    <div id="interactive-part">
        <h1 id="title-text">Поздравляю с 8 Марта! ❤️</h1>
        <div class="message-text" id="main-message">Нажми на кнопку, у меня есть кое-что для тебя...</div>
        <button id="action-btn" onclick="nextStep()">Продолжить ✨</button>
    </div>

    <div id="final-screen">
        <h1 style="font-size: 22px;">С праздником, любимая! 🌷</h1>
        <p style="color: #666; font-size: 15px;">Ты делаешь этот мир ярче. Пусть каждый твой день будет полон тепла!</p>
        
        <div class="photo-container">
            <img src="card.png" alt="Наша фотография">
        </div>

        <div class="b-day-note">Я помню, что 13 марта у тебя особенный день... 🎂 Жду не меньше тебя!</div>
        <p style="font-weight: bold; color: #ff6a88; margin-top: 15px;">Всегда рядом ❤️</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>
    let step = 0;
    const messages = [
        "Мой лучик солнца ☀️",
        "Моя Лара Джи (обожаю этот фильм с тобой!) 🎬",
        "Самая милая и неповторимая... 🥰",
        "Ты — причина моей улыбки каждый день ✨",
        "Готова увидеть главный сюрприз? 💖"
    ];

    function nextStep() {
        const btn = document.getElementById('action-btn');
        const msg = document.getElementById('main-message');
        const title = document.getElementById('title-text');

        // Эффект конфетти при каждом шаге
        confetti({
            particleCount: 25,
            spread: 40,
            origin: { y: 0.7 },
            colors: ['#ff6a88', '#ff99ac', '#ffffff']
        });

        if (step < messages.length) {
            // Меняем текст
            msg.style.opacity = 0;
            setTimeout(() => {
                msg.innerText = messages[step];
                msg.style.opacity = 1;
                step++;
                
                // На последнем шаге меняем текст кнопки
                if (step === messages.length) {
                    btn.innerText = "ОТКРЫТЬ ПОЛНОСТЬЮ ❤️";
                    btn.style.background = "linear-gradient(45deg, #d4418e, #ff0055)";
                }
            }, 200);
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById('interactive-part').style.display = 'none';
        const final = document.getElementById('final-screen');
        final.style.display = 'block';
        setTimeout(() => final.style.opacity = 1, 50);

        // Праздничный салют
        var end = Date.now() + (4 * 1000);
        (function frame() {
            confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
            confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());

        setInterval(spawnEmoji, 300);
    }

    function spawnEmoji() {
        const emoji = document.createElement('div');
        emoji.className = 'floating-element';
        const types = ['❤️', '💖', '🌸', '🌹', '✨', '💎'];
        emoji.innerText = types[Math.floor(Math.random() * types.length)];
        emoji.style.left = Math.random() * 100 + 'vw';
        emoji.style.fontSize = (Math.random() * 20 + 20) + 'px';
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 5000);
    }
</script>

</body>
</html>
